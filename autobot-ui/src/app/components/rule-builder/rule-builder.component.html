<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <div
    class="sidebar-backdrop"
    *ngIf="sidebarOpen && isNarrowLayout"
    (click)="toggleSidebar()"
    aria-hidden="true"></div>

  <aside class="sidebar panel" role="navigation" aria-label="Main">
    <div class="sidebar-header">
      <div class="logo">
        <i class="fas fa-robot" aria-hidden="true"></i>
        <span class="project-name">AutoBot</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" [routerLinkActiveOptions]="{ exact: false }">
        <i class="fas fa-chart-pie" aria-hidden="true"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/builder" routerLinkActive="active" class="nav-item">
        <i class="fas fa-sliders" aria-hidden="true"></i>
        <span>Rule Builder</span>
      </a>
      <span class="nav-item nav-item-disabled" title="Coming soon">
        <i class="fas fa-cog" aria-hidden="true"></i>
        <span>Settings</span>
      </span>
    </nav>
  </aside>

  <div class="main-column">
    <header class="top-header panel">
      <div class="header-main">
        <button
          type="button"
          class="sidebar-toggle icon-btn"
          (click)="toggleSidebar()"
          aria-label="Toggle navigation menu">
          <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
        <div class="header-titles">
          <h1 class="title">Rule Builder</h1>
          <p class="subtitle">Create and edit automation workflows</p>
        </div>
      </div>
      <div class="header-meta">
        <a
          class="docs-link"
          href="https://playwright.dev/docs/intro"
          target="_blank"
          rel="noopener noreferrer">Docs</a>
        <button type="button" class="profile-btn icon-btn" aria-label="Profile" title="Profile">
          <i class="fas fa-user" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <div class="builder-scroll">
      <div class="builder-inner">
        <div class="rule-builder-card panel">
          <div class="tab-content">
            <div class="form-section">
              <h2 class="section-heading">Rule details</h2>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label" for="rule-name">Rule Name</label>
                  <input
                    id="rule-name"
                    type="text"
                    class="form-input"
                    [(ngModel)]="rule.name"
                    placeholder="Enter rule name"
                    required />
                </div>
                <div class="form-group">
                  <label class="form-label" for="rule-author">Author</label>
                  <input
                    id="rule-author"
                    type="text"
                    class="form-input"
                    [(ngModel)]="rule.author"
                    placeholder="Author name" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="rule-project">Project</label>
                  <input
                    id="rule-project"
                    type="text"
                    class="form-input"
                    [(ngModel)]="rule.project"
                    placeholder="Project name" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="rule-browser">Browser</label>
                  <select id="rule-browser" class="form-input" [(ngModel)]="rule.browser">
                    <option value="google-chrome">Google Chrome</option>
                    <option value="microsoft-edge">Microsoft Edge</option>
                  </select>
                </div>
                <div class="form-group form-group-wide">
                  <label class="form-label" for="rule-desc">Description</label>
                  <textarea
                    id="rule-desc"
                    class="form-textarea"
                    rows="3"
                    [(ngModel)]="rule.description"
                    placeholder="Rule description"></textarea>
                </div>
              </div>
            </div>

            <div class="workflow-section">
              <h2 class="section-heading">Steps</h2>
              <div class="workflow-table-container" *ngIf="rule.steps.length > 0">
                <table class="workflow-table">
                  <thead>
                    <tr>
                      <th class="col-step-id">Step</th>
                      <th class="col-action-type">Action</th>
                      <th class="col-input-config">Configuration</th>
                      <th class="col-actions-head">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let step of rule.steps; let i = index" class="step-row">
                      <td class="col-step-id">
                        <span class="step-number">{{ i + 1 }}</span>
                      </td>
                      <td class="col-action-type">
                        <select
                          class="table-select"
                          [(ngModel)]="step.action"
                          (change)="onActionChange(step, i)">
                          <option value="navigate">Navigate</option>
                          <option value="click">Click</option>
                          <option value="fill">Input</option>
                          <option value="wait">Wait</option>
                          <option value="screenshot">Screenshot</option>
                          <option value="validate">Validate</option>
                        </select>
                      </td>
                      <td class="col-input-config">
                        <div *ngIf="step.action === 'navigate'" class="inline-config">
                          <span class="inline-label">URL</span>
                          <input type="text" class="inline-input" [(ngModel)]="step.url" placeholder="https://…" />
                        </div>
                        <div *ngIf="step.action === 'click'" class="inline-config">
                          <span class="inline-label">Selector</span>
                          <input type="text" class="inline-input" [(ngModel)]="step.selector" placeholder="CSS selector" />
                        </div>
                        <div *ngIf="step.action === 'fill'" class="inline-config">
                          <span class="inline-label">Field</span>
                          <input type="text" class="inline-input" [(ngModel)]="step.selector" placeholder="CSS selector" />
                          <span class="inline-label">Value</span>
                          <input type="text" class="inline-input" [(ngModel)]="step.text" placeholder="Text" />
                        </div>
                        <div *ngIf="step.action === 'wait'" class="inline-config">
                          <span class="inline-label">Ms</span>
                          <input type="number" class="inline-input inline-input-narrow" [(ngModel)]="step.duration" placeholder="3000" />
                        </div>
                        <div *ngIf="step.action === 'screenshot'" class="inline-config">
                          <label class="inline-checkbox">
                            <input type="checkbox" class="checkbox-input" [(ngModel)]="step.fullPage" [id]="'fullPage' + i" />
                            <span class="checkbox-text">Full page</span>
                          </label>
                        </div>
                        <div *ngIf="step.action === 'validate'" class="inline-config inline-config-stack">
                          <div class="inline-row">
                            <span class="inline-label">Type</span>
                            <select class="inline-select" [(ngModel)]="step.validationType">
                              <option value="exists">Element exists</option>
                              <option value="textContains">Text contains</option>
                              <option value="textEquals">Text equals</option>
                              <option value="visible">Visible</option>
                            </select>
                          </div>
                          <div class="inline-row">
                            <span class="inline-label">Selector</span>
                            <input type="text" class="inline-input" [(ngModel)]="step.selector" placeholder="CSS selector" />
                          </div>
                          <div class="inline-row" *ngIf="step.validationType !== 'exists'">
                            <span class="inline-label">Expected</span>
                            <input type="text" class="inline-input" [(ngModel)]="step.expectedValue" placeholder="Expected value" />
                          </div>
                        </div>
                      </td>
                      <td class="col-actions">
                        <div class="table-actions">
                          <button
                            type="button"
                            class="btn-icon btn-icon-add"
                            (click)="addStepAfter(i)"
                            title="Add step after"
                            aria-label="Add step after">
                            <i class="fas fa-plus" aria-hidden="true"></i>
                          </button>
                          <button
                            type="button"
                            class="btn-icon btn-icon-delete"
                            (click)="removeStep(i)"
                            title="Delete step"
                            aria-label="Delete step">
                            <i class="fas fa-trash" aria-hidden="true"></i>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="workflow-footer">
                <button type="button" class="btn-preview" (click)="previewJson()">
                  <i class="fas fa-eye" aria-hidden="true"></i>
                  Preview JSON
                </button>
                <button type="button" class="btn-save" (click)="saveRule()">
                  <i class="fas fa-save" aria-hidden="true"></i>
                  Save rule
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()" role="dialog" aria-modal="true" aria-labelledby="json-preview-title">
  <div class="modal-content panel" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 id="json-preview-title"><i class="fas fa-code" aria-hidden="true"></i> JSON preview</h3>
      <button type="button" class="modal-close" (click)="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <pre class="json-preview">{{ getJsonPreview() }}</pre>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-modal-secondary" (click)="copyToClipboard()">
        <i class="fas fa-copy" aria-hidden="true"></i>
        Copy JSON
      </button>
      <button type="button" class="btn-modal-primary" (click)="closeModal()">Close</button>
    </div>
  </div>
</div>
