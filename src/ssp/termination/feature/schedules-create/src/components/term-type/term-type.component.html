<div class="fds-card-root term-type-card">
  <div class="fds-card__card">
    <div class="fds-card__content">
    <div class="term-type-card__header">
      <h2 class="pvd-title__heading pvd-title__heading--level-3">
        {{ pageContent.terminationCardTitle }}
      </h2>
    </div>

    <wi-ds-label
      class="term-type-card__prompt"
      pvd-id="unvested-awards-label"
    >
      {{ pageContent.unvestedAwardsLabel }}
    </wi-ds-label>

    <wi-ds-radio-group
      class="term-type-card__options"
      ariaLabel="unvested awards options"
    >
      @for (option of options; track option.value) {
        <div
          class="term-type-card__option-row"
          [class.term-type-card__option-row--disabled]="
            isOptionDisabled(option.value)
          "
          [attr.aria-disabled]="isOptionDisabled(option.value) ? 'true' : null"
        >
          <wi-ds-radio
            [name]="'unvested-options'"
            [radioValue]="option.value"
            [checked]="store.formState().termType === option.value"
            [nativeInputAttributes]="
              isOptionDisabled(option.value) ? { disabled: true } : undefined
            "
            (change)="onTermTypeChange(option.value)"
            [attr.pvd-id]="option.value"
          >
            {{ option.label }}
          </wi-ds-radio>
        </div>
      }
    </wi-ds-radio-group>
    </div>
  </div>
</div>
